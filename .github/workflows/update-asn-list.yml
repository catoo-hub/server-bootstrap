name: Update ASN list

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install whois
        run: |
          sudo apt-get update
          sudo apt-get install -y whois
      - name: Generate allowed.lst
        run: |
          bash generate-asn.sh --output allowed.lst --logfile update_allowlist.log
      - name: Commit if changed
        run: |
          git config user.email "bot@github.com"
          git config user.name "ASN Bot"
          git diff --quiet allowed.lst || (git add allowed.lst && git commit -m "Update ASN list" && git push)
